<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Casa Cunera | Gallery</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #222;
      background: #fff;
    }

    nav {
      padding: 20px;
      text-align: center;
      background: #fff;
      border-bottom: 1px solid #eee;
    }

    nav a {
      margin: 0 15px;
      text-decoration: none;
      color: #222;
    }

    .section {
      max-width: 1100px;
      margin: auto;
      padding: 50px 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .gallery img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      border-radius: 10px;
      display: block;
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html">Home</a>
    <a href="gallery.html">Gallery</a>
  </nav>

  <div class="section">
    <h1>Casa Cunera Gallery</h1>

    <div class="gallery">
      <img src="Foto_binnen1.jpg" alt="Casa Cunera from the inside>
      <img src="Foto_huis1.jpg" alt="Picture of this beautiful house">
      <img src="Foto_tuin1.jpg" alt="Picture of the great garden">
      <img src="Foto_tuin2.jpg" alt="Another picture of the great garden">
    </div>
  </div>

</body>
</html>
